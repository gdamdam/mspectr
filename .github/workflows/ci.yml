name: CI

# Lint, type-check, test, and build on every push and pull request.
# `npm run check` runs lint + typecheck + test + build in sequence.

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
