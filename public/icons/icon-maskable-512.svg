<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="mspectr">
  <title>mspectr</title>
  <!-- Maskable variant: full-bleed background, art confined to the central safe
       zone (~80% diameter circle). The spectral-bin mark is scaled and centered
       so platform masks (circle/squircle/rounded) never clip it. -->
  <rect width="512" height="512" fill="#0a0e14"/>
  <defs>
    <linearGradient id="spxm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2de2e6"/>
      <stop offset="0.5" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#ff5dc8"/>
    </linearGradient>
  </defs>
  <!-- Group scaled to 0.62 about center (256,256): bars occupy ~y150..y360. -->
  <g transform="translate(256 256) scale(0.62) translate(-256 -256)">
    <g fill="url(#spxm)">
      <rect x="80" y="320" width="32" height="112" rx="16"/>
      <rect x="128" y="256" width="32" height="176" rx="16"/>
      <rect x="176" y="176" width="32" height="256" rx="16"/>
      <rect x="224" y="96" width="32" height="336" rx="16"/>
      <rect x="272" y="144" width="32" height="288" rx="16"/>
      <rect x="320" y="224" width="32" height="208" rx="16"/>
      <rect x="368" y="288" width="32" height="144" rx="16"/>
    </g>
    <rect x="72" y="432" width="368" height="13" rx="6.5" fill="#2de2e6" opacity="0.45"/>
  </g>
</svg>
