<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" role="img" aria-label="mspectr">
  <title>mspectr</title>
  <!-- Spectral mark: a column of frequency bins forming a peaked spectral
       envelope, tinted across the visible spectrum. Dark lab background. -->
  <rect width="192" height="192" rx="42" fill="#0a0e14"/>
  <defs>
    <linearGradient id="spx192" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2de2e6"/>
      <stop offset="0.5" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#ff5dc8"/>
    </linearGradient>
  </defs>
  <g fill="url(#spx192)">
    <rect x="30" y="120" width="12" height="42" rx="6"/>
    <rect x="48" y="96" width="12" height="66" rx="6"/>
    <rect x="66" y="66" width="12" height="96" rx="6"/>
    <rect x="84" y="36" width="12" height="126" rx="6"/>
    <rect x="102" y="54" width="12" height="108" rx="6"/>
    <rect x="120" y="84" width="12" height="78" rx="6"/>
    <rect x="138" y="108" width="12" height="54" rx="6"/>
  </g>
  <rect x="27" y="162" width="138" height="5" rx="2.5" fill="#2de2e6" opacity="0.45"/>
</svg>
